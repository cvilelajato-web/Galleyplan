<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Galley Plan Interactivo - Mobile</title>
<style>
:root{--bg:#f6f7f9;--ink:#17202a;--accent:#1677ff}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}
header{padding:18px 24px;background:#0f172a;color:white;position:sticky;top:0;z-index:4}
h1{margin:0;font-size:28px} .sub{font-size:14px;color:#dbeafe;margin-top:6px}
main{padding:18px;max-width:1700px;margin:0 auto}
.note{font-size:13px;color:#344;background:#fff;border:1px solid #ddd;border-radius:8px;padding:10px 12px;margin-bottom:12px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.legend button{border:1px solid #cbd5e1;background:#fff;padding:7px 10px;border-radius:999px;cursor:pointer}
.legend button:hover{border-color:var(--accent)}
section h2{font-size:16px;margin:18px 0 6px}
.planbox{background:white;border:1px solid #ccc;box-shadow:0 2px 12px #0001;overflow:auto;max-width:100%;margin-bottom:28px}
.plan-svg{display:block;max-width:none}
.hotspot{fill:rgba(22,119,255,0.01);stroke:rgba(22,119,255,0.10);stroke-width:2;cursor:pointer}
.hotspot:hover,.hotspot:focus{fill:rgba(22,119,255,0.20);stroke:rgba(22,119,255,0.95);outline:none}
.modal{display:none;position:fixed;inset:0;background:#0009;z-index:10;align-items:center;justify-content:center;padding:22px}
.modal.open{display:flex}
.card{background:#fff;max-width:min(950px,96vw);max-height:92vh;border-radius:12px;box-shadow:0 12px 50px #0006;overflow:auto}
.card-head{position:sticky;top:0;background:white;border-bottom:1px solid #eee;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.card h2{font-size:18px;margin:0} .close{font-size:30px;line-height:1;border:0;background:#fff;cursor:pointer}
.card-body{padding:18px;text-align:center} .card-body img{max-width:100%;height:auto;border:1px solid #ddd}

@media (max-width: 900px){
  header{padding:14px 16px}
  h1{font-size:24px}
  main{padding:10px;max-width:100%}
  .note{font-size:14px}
  .planbox{overflow:visible;border-radius:10px;margin-bottom:18px}
  .plan-svg{width:100%;height:auto;max-width:100%}
  section h2{font-size:18px;margin:16px 0 8px}
  .modal{padding:0;align-items:stretch;justify-content:stretch}
  .card{width:100vw;max-width:100vw;height:100vh;max-height:100vh;border-radius:0}
  .card-head{padding:12px 14px}.card h2{font-size:20px}.close{font-size:34px}
  .card-body{padding:12px}.card-body img{width:100%;max-width:100%;border:0}
  .hotspot{stroke-width:3}
}
</style></head><body>

function openItem(title){document.getElementById('modalTitle').textContent=title;document.getElementById('modalImg').src=items[title]||'';document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal') closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeModal();});
for (const title of Object.keys(items)){const b=document.createElement('button');b.textContent=title;b.onclick=()=>openItem(title);document.getElementById('legend').appendChild(b);}
document.querySelectorAll('.hotspot').forEach(el=>{el.addEventListener('click',()=>openItem(el.dataset.title));el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openItem(el.dataset.title);}});});
</script></body></html>
