function openItem(title){if(!items[title] && !excelImages[title])return;document.getElementById('modalTitle').textContent=title;const stack=document.getElementById('imageStack');stack.innerHTML='';const note=document.getElementById('modalNote');const imgs=excelImages[title]||[];if(imgs.length){note.textContent='';imgs.forEach((src,i)=>{const im=document.createElement('img');im.src=src;im.alt=title+' imagen Excel '+(i+1);im.className='excel-img';stack.appendChild(im);});}else{note.textContent='';}if(items[title]){const im=document.createElement('img');im.src=items[title];im.alt=title;stack.appendChild(im);}document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal') closeModal();});document.addEventListener('keydown',e=>{if(e.key==='Escape') closeModal();});
for (const title of Object.keys(excelImages).filter(k=>excelImages[k]&&excelImages[k].length)){const b=document.createElement('button');b.textContent=title;b.onclick=()=>openItem(title);document.getElementById('legend').appendChild(b);}
document.querySelectorAll('.hotspot').forEach(el=>{el.addEventListener('click',()=>openItem(el.dataset.title));el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openItem(el.dataset.title);}});});
</script></body></html>
